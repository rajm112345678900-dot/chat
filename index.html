<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChitChat | Premium Real-time Rooms</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Style -->
    <link rel="stylesheet" href="style.css">

    <!-- Emoji Picker (Emoji Mart) -->
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
</head>

<body>

    <!-- 1. LOGIN OVERLAY -->
    <div id="loginOverlay" class="overlay active">
        <div class="overlay-card fade-in">
            <h1>Welcome to ChitChat</h1>
            <p>Enter your name to get started</p>
            <input type="text" id="usernameInput" placeholder="How should we call you?" maxlength="15">
            <button id="enterBtn" class="primary-btn">Continue</button>
        </div>
    </div>

    <!-- 2. DASHBOARD OVERLAY -->
    <div id="dashboardOverlay" class="overlay">
        <div class="overlay-card wide slide-up">
            <div class="dashboard-header">
                <h2>Chat Dashboard</h2>
                <span id="welcomeName"></span>
            </div>

            <div class="dashboard-grid">
                <div class="dash-box">
                    <h3>Create Room</h3>
                    <input type="text" id="newRoomName" placeholder="Room Name">
                    <input type="password" id="newRoomPass" placeholder="Set Password (Optional)">
                    <button id="createRoomBtn" class="accent-btn">Create & Join</button>
                </div>

                <div class="divider"><span>OR</span></div>

                <div class="dash-box">
                    <h3>Join Room</h3>
                    <input type="text" id="joinRoomCode" placeholder="6-char Code (e.g. ESMBWG)">
                    <input type="password" id="joinRoomPass" placeholder="Enter Password">
                    <button id="joinRoomBtn" class="primary-btn">Join Chat</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. MAIN CHAT APP -->
    <div id="appContainer" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <div class="brand">
                    <div class="logo-dot"></div>
                    <span>ChitChat</span>
                </div>
                <button id="leaveRoomBtn" class="icon-btn" title="Leave Room">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
                    </svg>
                </button>
            </header>

            <div class="room-info-card">
                <p class="label">Room Code</p>
                <div class="code-box">
                    <span id="displayRoomCode">------</span>
                    <button id="copyCodeBtn" title="Copy Code">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="members-section">
                <div class="section-header">
                    <span>Members</span>
                    <span class="count-badge" id="memberCount">0</span>
                </div>
                <div class="member-list" id="memberList"></div>
            </div>

            <div class="sidebar-footer">
                <div class="user-pill">
                    <div class="status-dot online"></div>
                    <span id="myUsername">User</span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-chat">
            <header class="chat-header">
                <button id="mobileMenuBtn" class="icon-btn mobile-only">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <div class="room-title">
                    <h2 id="displayRoomName">Select a Room</h2>
                    <p class="encryption-notice">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12">
                            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
                        </svg>
                        End-to-end simulated encryption active
                    </p>
                </div>
            </header>

            <div class="messages-viewport" id="msgViewport">
                <div class="empty-state">
                    <p>Welcome to the room!</p>
                </div>
            </div>

            <div class="typing-indicator-bar" id="typingBar"></div>

            <div class="input-area">
                <div class="input-actions">
                    <button class="tool-btn" id="emojiBtn" title="Emoji">
                        <svg viewBox="0 0 24 24" fill="none" class="icon-sm" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" />
                        </svg>
                    </button>
                    <label class="tool-btn" title="Upload File">
                        <input type="file" id="fileUpload" hidden>
                        <svg viewBox="0 0 24 24" fill="none" class="icon-sm" stroke="currentColor" stroke-width="2">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
                        </svg>
                    </label>
                </div>
                <div class="msg-input-wrap">
                    <input type="text" id="mainInput" placeholder="Type a message..." autocomplete="off">
                </div>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Firebase SDK & App Logic -->
    <script type="module" src="app.js?v=5"></script>
</body>

</html>
